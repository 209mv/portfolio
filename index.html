<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio OS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- BOOT / SIGN IN SCREEN -->
<div id="boot-screen">
  <div class="boot-box glass">
    <h1>Portfolio OS</h1>
    <p>Welcome</p>
    <button onclick="enter()">Sign In</button>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop" class="hidden">

  <div class="icon" onclick="openWindow('about')">🧑 About</div>
  <div class="icon" onclick="openWindow('certs')">📜 Certs</div>
  <div class="icon" onclick="openWindow('skills')">💻 Skills</div>
  <div class="icon" onclick="openWindow('contact')">📧 Contact</div>

  <!-- WINDOWS -->
  <div id="about" class="window hidden">
    <div class="titlebar">
      About
      <button onclick="closeWindow('about')">X</button>
    </div>
    <div class="content">
      <p>Cybersecurity & Machine Learning learner.</p>
    </div>
  </div>

  <div id="certs" class="window hidden">
    <div class="titlebar">
      Certifications
      <button onclick="closeWindow('certs')">X</button>
    </div>
    <div class="content" id="cert-list"></div>
    <div class="content" id="badge-list"></div>
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
